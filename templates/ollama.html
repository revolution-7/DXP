{% extends 'welcome.html' %}

{% block title %}My Custom Page{% endblock %}

{% block content %}
<title>邓小平大模型</title>
<h1>邓小平大模型</h1>
<form id="question-form" method="POST" action="/decision_support">
    <label for="question">请输入您的问题：</label>
    <br>
    <textarea id="question" name="question" rows="4" cols="50" placeholder="输入问题"></textarea>
    <br><br>
    <button type="submit">生成回答</button>
</form>
<h2>回答：</h2>
<div id="answer">
    {% if answer %}
    <p>{{ answer }}</p>
    {% endif %}
</div>
{% endblock %}
