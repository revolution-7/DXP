<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国历史事件查询系统</title>
    <link rel="stylesheet" href="static/dxp.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('welcome') }}">中国历史事件查询系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('welcome') }}">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('search_events') }}">事件查询</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('search_persons') }}">人物查询</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('search_time') }}">时间查询</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('model') }}">大模型</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('edit_data') }}">编辑数据</a>
                    </li>
                    <!-- 登录状态相关 -->
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('logout') }}">退出登录</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 页面主体内容 -->
    <div class="container mt-5">
        {% block content %}
        <!-- 这里的 content 会在其他模板中被覆盖 -->
        {% endblock %}
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
